version: "3.9"

# Projetenne — Docker Compose On-Premise
# Usage : cp .env.example .env && docker-compose up -d

services:

  # ── Base de données MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── API Backend FastAPI ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URL: "mongodb://mongo:27017"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Frontend React servi par Nginx ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Traefik reverse-proxy HTTPS automatique (Let's Encrypt) ───────────────
  # Actif seulement si DOMAIN est défini dans .env — sinon ports HTTP directs
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    profiles:
      - https          # docker compose --profile https up -d
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Redirection HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=false"

  # ── Profil HTTP (sans Traefik, port direct) ────────────────────────────────
  # Utilisé par défaut quand DOMAIN n'est pas défini
  nginx-http:
    image: nginx:alpine
    restart: unless-stopped
    profiles:
      - http-only      # docker compose --profile http-only up -d
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx-http.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
  letsencrypt:
